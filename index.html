<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Safe Mode</title>
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .btn-reset { background: #8b0000; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; margin-bottom: 20px; }
        .error-log { color: #ff7b72; font-family: monospace; font-size: 12px; margin-bottom: 10px; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; box-sizing: border-box; }
        .btn-update { background: #e67e22; color: black; font-weight: bold; padding: 10px; width: 100%; border: none; margin-top: 10px; }
        .item { background: #161b22; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<button class="btn-reset" onclick="resetApp()">XÓA HẾT DỮ LIỆU & LÀM MỚI</button>
<div id="debug" class="error-log"></div>

<textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
<button class="btn-update" onclick="runApp()">CHẠY APP</button>

<div id="display" style="margin-top: 20px;"></div>

<script>
    function log(msg) { document.getElementById('debug').innerText = msg; }
    
    function resetApp() {
        localStorage.clear();
        location.reload();
    }

    function runApp() {
        try {
            const raw = document.getElementById('jsonInput').value;
            if (!raw) return log("Chưa dán JSON!");
            
            const data = JSON.parse(raw);
            localStorage.setItem('coc_data', raw);
            render(data);
            log("Đã tải dữ liệu thành công!");
        } catch(e) {
            log("LỖI JSON: " + e.message);
        }
    }

    function render(data) {
        const d = document.getElementById('display');
        d.innerHTML = '';
        const keys = ["buildings", "units2", "pets", "buildings2"];
        
        keys.forEach(k => {
            if (data[k]) {
                d.innerHTML += `<h3>${k}</h3>`;
                data[k].forEach(item => {
                    if (item.timer > 0) {
                        d.innerHTML += `<div class="item">${item.id || item.name} - ${item.timer}s</div>`;
                    }
                });
            }
        });
    }

    // Tự động tải nếu đã có dữ liệu
    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            runApp();
        }
    };
</script>
</body>
</html>
