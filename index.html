<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Pro - Stable Version</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-danger { background: #552222; border: 1px solid #8b0000; color: #ff7b72; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-tg { background: #2AABEE; border: 1px solid #1c88c7; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 5px; font-weight: bold;}
        
        #error-box { display: none; background: #552222; color: #ff7b72; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; border: 1px solid #8b0000; }
        
        .summary-card { background: #1c2128; border-radius: 8px; padding: 10px; margin-bottom: 15px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2d333b; align-items: center; }
        .summary-row:last-child { border-bottom: none; }
        
        .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .b-id { font-size: 0.75em; color: #8b949e; margin-bottom: 5px; font-family: monospace; }
        
        .btn-edit { padding: 4px 10px; background: #30363d; border: none; color: #aaa; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-alarm { padding: 4px 8px; background: #004488; border: none; color: #fff; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 5px; }
        
        .live-timer { font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.15em; color: #fff; }
        .sum-timer { font-family: 'Courier New', monospace; font-weight: bold; color: #fff; }

        .progress-container { background: #0d1117; height: 5px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.2s linear; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; border-top: 1px solid #30363d; z-index: 100; box-sizing: border-box; }
        textarea { width: 100%; height: 45px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; box-sizing: border-box; resize: none; }
        .btn-update { width: 100%; margin-top: 5px; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }

        .empty-state { text-align: center; color: #8b949e; padding: 40px 20px; font-style: italic; background: #161b22; border-radius: 8px; margin-top: 20px; border: 1px dashed #30363d; }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-weight:bold; color:var(--accent); text-transform: uppercase; letter-spacing: 0.5px;">Tiến độ</div>
    <div>
        <button class="btn-tg" onclick="configTelegram()">✈️ Telegram</button>
        <button class="btn-danger" onclick="resetAll()">Xóa JSON</button>
    </div>
</div>

<div id="error-box"></div>

<div id="summary-list" class="summary-card" style="display: none;"></div>
<div id="list"></div>
<div style="height: 130px;"></div> 

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT DỮ LIỆU</button>
</div>

    window.onerror = function(msg, url, lineNo) {
        const errBox = document.getElementById('error-box');
        if(errBox) {
            errBox.style.display = 'block';
            errBox.innerHTML += `Lỗi Safari: ${msg} (Dòng ${lineNo})<br>`;
        }
        return false;
    };

        console.error("Lỗi đọc từ điển tên");
    }
