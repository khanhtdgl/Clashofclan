<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Status Dashboard</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Dashboard Container */
        #dashboard { max-width: 700px; margin: 0 auto 150px auto; }
        
        /* Progress Card */
        .card { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .info { flex: 1; }
        .label { font-size: 0.8em; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .lvl { font-size: 1.2em; font-weight: bold; color: #fff; }
        .timer { font-family: monospace; font-size: 1.4em; color: #00ff00; }
        
        /* Input Footer */
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 20px; box-sizing: border-box; border-top: 1px solid #30363d; box-shadow: 0 -5px 10px rgba(0,0,0,0.5); }
        textarea { width: 100%; max-width: 700px; margin: 0 auto; display: block; height: 60px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        .btn-update { width: 100%; max-width: 700px; margin: 10px auto 0 auto; display: block; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <h2 style="text-align:center; color: var(--accent);">TIẾN ĐỘ NÂNG CẤP</h2>
    <div id="list"></div>
</div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT DỮ LIỆU</button>
</div>

<script>
    let activeItems = [];

    // Map category to readable labels
    const catMap = { "buildings": "Thợ xây", "buildings2": "Thợ xây BB", "pets": "Nhà linh thú", "units2": "Phòng thí nghiệm" };

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    function processJSON(raw) {
        try {
            const data = JSON.parse(raw);
            activeItems = [];
            Object.keys(catMap).forEach(cat => {
                if (data[cat]) {
                    data[cat].forEach(item => {
                        if (item.timer) {
                            activeItems.push({ 
                                type: catMap[cat], 
                                lvl: item.lvl, 
                                timer: item.timer,
                                total: item.timer // Bạn có thể lưu tổng thời gian nếu JSON cung cấp
                            });
                        }
                    });
                }
            });
            sortAndRender();
        } catch(e) { alert("Dữ liệu JSON lỗi!"); }
    }

    function sortAndRender() {
        activeItems.sort((a, b) => a.timer - b.timer);
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        activeItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="info">
                    <div class="label">${item.type}</div>
                    <div class="lvl">Lv. ${item.lvl}</div>
                </div>
                <div class="timer" id="timer-${index}">${format(item.timer)}</div>
            `;
            listDiv.appendChild(div);
        });
    }

    function format(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}h ${m}m ${sec}s`;
    }

    setInterval(() => {
        activeItems.forEach((item, index) => {
            if (item.timer > 0) {
                item.timer--;
                const el = document.getElementById(`timer-${index}`);
                if (el) el.innerText = format(item.timer);
            }
        });
    }, 1000);

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
