<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Pro Dashboard</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-danger { background: #552222; border: 1px solid #8b0000; color: #ff7b72; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        
        .summary-card { background: #1c2128; border-radius: 8px; padding: 10px; margin-bottom: 15px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2d333b; }
        
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .btn-edit { padding: 4px 10px; background: #30363d; border: none; color: #aaa; border-radius: 4px; font-size: 11px; }
        
        .progress-container { background: #0d1117; height: 5px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; }
        
        #input-zone { position: sticky; bottom: 0; background: #1c2128; padding: 10px; border-top: 1px solid #30363d; margin-top: 20px; }
        textarea { width: 100%; height: 50px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        .btn-update { width: 100%; margin-top: 5px; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-weight:bold; color:var(--accent)">DASHBOARD</div>
    <button class="btn-danger" onclick="resetAll()">Xóa dữ liệu</button>
</div>

<div id="summary-list" class="summary-card"></div>
<div id="list"></div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT DỮ LIỆU</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    let appData = null;
    let timerInterval = null;
    const order = ["buildings", "units2", "pets", "buildings2"];
    const titles = { "buildings": "Làng chính", "units2": "Nghiên cứu", "pets": "Linh thú", "buildings2": "Làng thợ xây" };

    function resetAll() {
        if(confirm("Xóa hết dữ liệu và làm mới app?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            localStorage.setItem('coc_data', raw);
            processData(data);
        } catch(e) { alert("JSON Lỗi! Kiểm tra lại dữ liệu."); }
    }

    function editName(id) {
        const newName = prompt(`Đặt tên cho: ${id}`, nameMap[id] || "");
        if (newName !== null) {
            nameMap[id] = newName;
            localStorage.setItem('name_mapping', JSON.stringify(nameMap));
            render();
        }
    }

    function processData(data) {
        appData = data;
        render();
    }

    function render() {
        if (!appData) return;
        const listDiv = document.getElementById('list');
        const sumDiv = document.getElementById('summary-list');
        listDiv.innerHTML = ''; sumDiv.innerHTML = '';

        order.forEach(key => {
            if (appData[key]) {
                appData[key] = appData[key].filter(i => i.timer > 0).sort((a, b) => a.timer - b.timer);
                
                if (appData[key].length > 0) {
                    sumDiv.innerHTML += `<div class="summary-row"><span>${titles[key]}</span><span style="font-family:monospace; font-weight:bold">${format(appData[key][0].timer)}</span></div>`;
                    
                    listDiv.innerHTML += `<div style="color:var(--accent); font-size:0.8em; font-weight:bold; margin: 10px 0 5px 5px;">${titles[key].toUpperCase()}</div>`;
                    
                    appData[key].forEach((item, index) => {
                        const id = item.id || item.name;
                        item.total = item.total || item.totalTime || item.duration || (item.timer * 1.1);
                        const percent = Math.min(100, Math.max(0, ((item.total - item.timer) / item.total) * 100));
                        
                        listDiv.innerHTML += `
                            <div class="card">
                                <div class="flex-row">
                                    <div class="b-name">${nameMap[id] || id}</div>
                                    <button class="btn-edit" onclick="editName('${id}')">Sửa</button>
                                </div>
                                <div id="t-${key}-${index}" style="font-family:monospace; font-weight:bold; font-size:1.1em">${format(item.timer)}</div>
                                <div class="progress-container"><div class="progress-bar" id="b-${key}-${index}" style="width:${percent}%"></div></div>
                            </div>`;
                    });
                }
            }
        });
    }

    // Vòng lặp đếm ngược
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!appData) return;
        let needsRender = false;
        order.forEach(key => {
            if(appData[key]) {
                appData[key].forEach((item, index) => {
                    if (item.timer > 0) {
                        item.timer--;
                        const el = document.getElementById(`t-${key}-${index}`);
                        const bar = document.getElementById(`b-${key}-${index}`);
                        if (el) el.innerText = format(item.timer);
                        if (bar) bar.style.width = `${Math.min(100, Math.max(0, ((item.total - item.timer) / item.total) * 100))}%`;
                    } else {
                        needsRender = true;
                    }
                });
            }
        });
        if (needsRender) render();
    }, 1000);

    function format(s) {
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        return (d > 0 ? d + "d " : "") + h + "h " + m + "m";
    }

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            try { processData(JSON.parse(saved)); document.getElementById('jsonInput').value = saved; }
            catch(e) { console.log("Lỗi tải data cũ"); }
        }
    };
</script>
</body>
</html>
