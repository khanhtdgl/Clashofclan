<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Mobile Dash</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; }
        #dashboard { max-width: 100%; margin-bottom: 120px; }
        
        .group-header { display: flex; justify-content: space-between; align-items: center; color: var(--accent); font-size: 0.85em; font-weight: bold; margin: 15px 5px 8px 5px; text-transform: uppercase; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .group-timer { color: #fff; font-family: monospace; }
        
        .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .timer { font-family: 'Courier New', monospace; font-size: 1.1em; color: #fff; font-weight: bold; }
        
        .progress-container { background: #0d1117; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 15px; box-sizing: border-box; border-top: 1px solid #30363d; z-index: 100; }
        textarea { width: 100%; height: 50px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; padding: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-update { width: 100%; margin-top: 10px; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="list"></div>
</div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON tại đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>

<script>
    // Thứ tự hiển thị (Làng thợ xây ở cuối)
    const order = ["buildings", "units2", "pets", "buildings2"];
    const groupTitles = {
        "buildings": "Thợ xây (Làng chính)",
        "buildings2": "Làng thợ xây",
        "units2": "Phòng nghiên cứu",
        "pets": "Nhà linh thú"
    };

    let dataGroups = {};

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    function processJSON(raw) {
        try {
            const data = JSON.parse(raw);
            dataGroups = {};
            order.forEach(k => dataGroups[k] = []);

            Object.keys(dataGroups).forEach(cat => {
                if (data[cat]) {
                    data[cat].forEach(item => {
                        if (item.timer) {
                            dataGroups[cat].push({ timer: item.timer, total: item.timer * 1.1 });
                        }
                    });
                    dataGroups[cat].sort((a, b) => a.timer - b.timer);
                }
            });
            render();
        } catch(e) { alert("JSON lỗi!"); }
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        
        order.forEach(key => {
            if (dataGroups[key].length > 0) {
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `<span>${groupTitles[key]}</span><span class="group-timer" id="g-timer-${key}">--</span>`;
                listDiv.appendChild(header);

                dataGroups[key].forEach((item, index) => {
                    const id = `${key}-${index}`;
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="flex-row">
                            <div style="font-size:0.9em; opacity:0.8;">Đang nâng cấp</div>
                            <div class="timer" id="timer-${id}">${format(item.timer)}</div>
                        </div>
                        <div class="progress-container"><div class="progress-bar" id="bar-${id}" style="width:0%"></div></div>
                    `;
                    listDiv.appendChild(div);
                });
            }
        });
    }

    function format(s) {
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        let res = "";
        if (d > 0) res += d + "d ";
        res += `${h}h ${m}m ${sec}s`;
        return res;
    }

    setInterval(() => {
        order.forEach(key => {
            let minTime = Infinity;
            dataGroups[key].forEach((item, index) => {
                if (item.timer > 0) {
                    item.timer--;
                    const id = `${key}-${index}`;
                    const el = document.getElementById(`timer-${id}`);
                    if (el) el.innerText = format(item.timer);
                    const bar = document.getElementById(`bar-${id}`);
                    if (bar) bar.style.width = `${((item.total - item.timer) / item.total) * 100}%`;
                }
                if (item.timer < minTime) minTime = item.timer;
            });
            
            const gTimer = document.getElementById(`g-timer-${key}`);
            if (gTimer) {
                gTimer.innerText = minTime === Infinity ? "Xong" : format(minTime);
            }
        });
    }, 1000);

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
