<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Mobile Pro</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        #dashboard { max-width: 100%; margin-bottom: 120px; }
        .summary-card { background: #1c2128; border-radius: 8px; padding: 10px; margin-bottom: 20px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2d333b; }
        .summary-label { color: #8b949e; }
        .summary-time { font-family: monospace; color: #fff; font-weight: bold; }
        .group-header { display: flex; justify-content: space-between; align-items: center; color: var(--accent); font-size: 0.85em; font-weight: bold; margin: 15px 5px 8px 5px; text-transform: uppercase; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 6px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .b-name { font-weight: bold; color: #fff; }
        .timer { font-family: 'Courier New', monospace; font-size: 1em; color: #fff; }
        .progress-container { background: #0d1117; height: 5px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s; }
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 12px; box-sizing: border-box; border-top: 1px solid #30363d; z-index: 100; }
        textarea { width: 100%; height: 45px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; padding: 8px; box-sizing: border-box; font-size: 13px; }
        .btn-update { width: 100%; margin-top: 8px; padding: 8px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="group-header">TỔNG QUAN</div>
    <div class="summary-card" id="summary-list"></div>
    <div id="list"></div>
</div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT TIẾN ĐỘ</button>
</div>

<script>
    const nameMap = { "townHall": "Nhà chính", "archerTower": "Tháp Cung", "cannon": "Pháo", "wizardTower": "Tháp Phù Thủy", "airDefense": "Phòng thủ bay", "laboratory": "Phòng Lab", "petHouse": "Nhà linh thú" };
    const order = ["buildings", "units2", "pets", "buildings2"];
    const groupTitles = { "buildings": "Làng chính", "units2": "Nghiên cứu", "pets": "Linh thú", "buildings2": "Làng thợ xây" };
    let dataGroups = {};

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    function processJSON(raw) {
        try {
            const data = JSON.parse(raw);
            dataGroups = {};
            order.forEach(k => dataGroups[k] = []);

            Object.keys(dataGroups).forEach(cat => {
                if (data[cat]) {
                    data[cat].forEach(item => {
                        if (item.timer) {
                            // CẢI TIẾN: Ưu tiên lấy totalTime hoặc duration từ JSON
                            // Nếu không có mới dùng timer + 10% (tránh lỗi null)
                            const total = item.totalTime || item.duration || (item.timer * 1.1);
                            const name = nameMap[item.id] || nameMap[item.name] || item.id || "Nâng cấp";
                            dataGroups[cat].push({ name: name, timer: item.timer, total: total });
                        }
                    });
                    dataGroups[cat].sort((a, b) => a.timer - b.timer);
                }
            });
            render();
        } catch(e) { alert("JSON lỗi! Hãy kiểm tra lại format."); }
    }

    function render() {
        const listDiv = document.getElementById('list');
        const summaryDiv = document.getElementById('summary-list');
        listDiv.innerHTML = ''; summaryDiv.innerHTML = '';
        
        order.forEach(key => {
            // Hiển thị tóm tắt
            const sumRow = document.createElement('div');
            sumRow.className = 'summary-row';
            sumRow.innerHTML = `<span class="summary-label">${groupTitles[key]}</span><span class="summary-time" id="sum-${key}">--</span>`;
            summaryDiv.appendChild(sumRow);

            if (dataGroups[key].length > 0) {
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `<span>${groupTitles[key]}</span>`;
                listDiv.appendChild(header);

                dataGroups[key].forEach((item, index) => {
                    const id = `${key}-${index}`;
                    const percent = Math.min(100, Math.max(0, ((item.total - item.timer) / item.total) * 100));
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="flex-row">
                            <div class="b-name">${item.name}</div>
                            <div class="timer" id="timer-${id}">${format(item.timer)}</div>
                        </div>
                        <div class="progress-container"><div class="progress-bar" id="bar-${id}" style="width:${percent}%"></div></div>
                    `;
                    listDiv.appendChild(div);
                });
            }
        });
    }

    function format(s) {
        if (s <= 0) return "Hoàn tất";
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        let res = "";
        if (d > 0) res += d + "d ";
        res += `${h}h ${m}m ${s % 60}s`;
        return res;
    }

    // Interval cập nhật
    setInterval(() => {
        order.forEach(key => {
            let minTime = Infinity;
            dataGroups[key].forEach((item, index) => {
                if (item.timer > 0) {
                    item.timer--;
                    const id = `${key}-${index}`;
                    const el = document.getElementById(`timer-${id}`);
                    if (el) el.innerText = format(item.timer);
                    const bar = document.getElementById(`bar-${id}`);
                    if (bar) {
                        const percent = Math.min(100, Math.max(0, ((item.total - item.timer) / item.total) * 100));
                        bar.style.width = `${percent}%`;
                    }
                }
                if (item.timer < minTime) minTime = item.timer;
            });
            
            const timeStr = minTime === Infinity ? "Xong" : format(minTime);
            if(document.getElementById(`sum-${key}`)) document.getElementById(`sum-${key}`).innerText = timeStr;
        });
    }, 1000);

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
