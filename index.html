<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Manager</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .b-id { font-size: 0.75em; color: #8b949e; font-family: monospace; }
        .btn-edit { padding: 4px 8px; background: #30363d; border: none; color: #fff; border-radius: 4px; font-size: 11px; cursor: pointer; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; box-sizing: border-box; border-top: 1px solid #30363d; z-index: 100; }
        textarea { width: 100%; height: 40px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; padding: 8px; box-sizing: border-box; }
        .btn-update { width: 100%; margin-top: 5px; padding: 8px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div id="list"></div>
    <div style="height: 120px;"></div> </div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT TIẾN ĐỘ</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    let cachedData = null; // Lưu data tạm để render lại nhanh

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    // Hàm gọi khi bấm nút [Sửa]
    function editName(id) {
        const currentName = nameMap[id] || "";
        const newName = prompt(`Nhập tên tiếng Việt cho mã: ${id}`, currentName);
        if (newName !== null) {
            nameMap[id] = newName;
            localStorage.setItem('name_mapping', JSON.stringify(nameMap));
            if(cachedData) processJSON(JSON.stringify(cachedData)); // Render lại bằng data cũ
        }
    }

    function processJSON(raw) {
        try {
            cachedData = JSON.parse(raw);
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            
            const groups = ["buildings", "units2", "pets", "buildings2"];
            groups.forEach(key => {
                if (cachedData[key] && cachedData[key].length > 0) {
                    listDiv.innerHTML += `<div style="color:var(--accent); font-weight:bold; margin: 15px 0 5px 5px;">${key.toUpperCase()}</div>`;
                    
                    cachedData[key].forEach(item => {
                        const id = item.id || item.name;
                        const displayName = nameMap[id] || id; // Nếu chưa có tên thì hiện mã
                        
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = `
                            <div class="flex-row">
                                <div class="b-name">${displayName}</div>
                                <button class="btn-edit" onclick="editName('${id}')">Sửa</button>
                            </div>
                            <div class="b-id">Mã: ${id}</div>
                            <div style="font-weight:bold; margin-top:5px;">${format(item.timer)}</div>
                        `;
                        listDiv.appendChild(div);
                    });
                }
            });
        } catch(e) { alert("JSON lỗi!"); }
    }

    function format(s) {
        if (s <= 0) return "Hoàn tất";
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        return (d>0 ? d+"d " : "") + h + "h " + Math.floor((s%3600)/60) + "m";
    }

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
