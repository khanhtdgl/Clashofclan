<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Real-time Dash</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        
        .summary-card { background: #1c2128; border-radius: 8px; padding: 10px; margin-bottom: 20px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2d333b; }
        
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .btn-edit { padding: 4px 10px; background: #30363d; border: none; color: #aaa; border-radius: 4px; font-size: 11px; cursor: pointer; }
        
        .progress-container { background: #0d1117; height: 5px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; border-top: 1px solid #30363d; z-index: 100; }
        textarea { width: 100%; height: 40px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        .btn-update { width: 100%; margin-top: 5px; padding: 8px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div style="color:var(--accent); font-weight:bold; margin-bottom:5px">TỔNG QUAN THỜI GIAN THỰC</div>
    <div class="summary-card" id="summary-list"></div>
    <div id="list"></div>
    <div style="height: 120px;"></div>
</div>

<div id="input-zone">

    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>
