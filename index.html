<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CoC Tracker - Mapping Chính Xác</title>
    <style>
        /* ... CSS giữ nguyên như cũ cho đẹp ... */
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 10px; border-left: 5px solid #ffcc00; display: flex; justify-content: space-between; }
        .unknown-id { color: #ff5555; font-size: 0.8em; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: auto;">
        <h1>CoC Upgrade Tracker</h1>
        <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
        <button onclick="handlePaste()" style="padding:10px; width:100%; cursor:pointer;">Cập nhật dữ liệu</button>
        <div id="list"></div>
    </div>

    <script>
        // BẢNG TRA CỨU TÊN (Dựa trên JSON của bạn)
        // Bạn hãy copy ID trong phần "unknown-id" hiển thị trên web và thêm vào đây
        const nameMap = {
            "1000003": "Pháo (Cannon)",
            "1000013": "Tháp Cung Thủ",
            "1000026": "Kho Vàng",
            "1000068": "X-Bow",
            "73000007": "Diggy (Linh thú)",
            "4000110": "Lính (Unit 4000110)",
            "26000002": "Phép thuật (Spell 26000002)"
        };

        function processJSON(raw) {
            try {
                const data = JSON.parse(raw);
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = '';
                
                // Quét qua các mục có timer
                ['buildings', 'buildings2', 'pets', 'units2', 'spells'].forEach(cat => {
                    if (data[cat]) {
                        data[cat].forEach((item, idx) => {
                            if (item.timer) {
                                const id = item.data.toString();
                                const name = nameMap[id] || `<span class="unknown-id">Cần cập nhật ID: ${id}</span>`;
                                
                                const div = document.createElement('div');
                                div.className = 'card';
                                div.innerHTML = `
                                    <div><strong>${name}</strong> (Lv.${item.lvl})</div>
                                    <div class="timer">${Math.floor(item.timer/3600)}h ${Math.floor((item.timer%3600)/60)}m</div>
                                `;
                                listDiv.appendChild(div);
                            }
                        });
                    }
                });
            } catch(e) { alert("JSON lỗi!"); }
        }

        function handlePaste() {
            const raw = document.getElementById('jsonInput').value;
            processJSON(raw);
        }
    </script>
</body>
</html>
