<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Pro - Precision Edit</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-danger { background: #552222; border: 1px solid #8b0000; color: #ff7b72; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .group-header { color: var(--accent); font-size: 0.85em; font-weight: bold; margin: 15px 0 5px 5px; display: flex; justify-content: space-between; align-items: center; }
        .group-deadline { color: #58a6ff; font-weight: normal; font-size: 0.9em; }
        .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .btn-edit { padding: 4px 10px; background: #30363d; border: none; color: #aaa; border-radius: 4px; cursor: pointer; }
        .btn-time-edit { padding: 2px 8px; background: #8b5cf6; border: none; color: white; border-radius: 3px; font-size: 10px; cursor: pointer; }
        .live-timer { font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.15em; color: #fff; }
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; border-top: 1px solid #30363d; z-index: 100; box-sizing: border-box; }
        textarea { width: 100%; height: 45px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; resize: none; }
        .btn-update { width: 100%; margin-top: 5px; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-weight:bold; color:var(--accent); text-transform: uppercase;">Tiến độ nâng cấp</div>
    <button class="btn-danger" onclick="resetAll()">Xóa JSON</button>
</div>

<div id="list"></div>
<div style="height: 130px;"></div> 

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    let timeOffsets = JSON.parse(localStorage.getItem('time_offsets') || '{}');
    let appData = null;
    const order = ["buildings", "units2", "pets", "buildings2"];
    const titles = { "buildings": "Làng chính", "units2": "Phòng thí nghiệm", "pets": "Nhà linh thú", "buildings2": "Làng thợ xây" };

    function resetAll() { if(confirm("Xóa tất cả?")) { localStorage.clear(); location.reload(); } }

    function handleInput() {
        try {
            const raw = document.getElementById('jsonInput').value;
            localStorage.setItem('coc_data', raw);
            localStorage.setItem('coc_sync_time', Date.now().toString());
            processData(JSON.parse(raw));
        } catch(e) { alert("JSON lỗi!"); }
    }

    // Sửa giờ từng công trình
    function editTime(uid) {
        const newSec = prompt("Nhập số giây còn lại mong muốn (VD: 3600 cho 1 giờ):");
        if (newSec !== null && !isNaN(newSec)) {
            timeOffsets[uid] = parseInt(newSec) - Math.floor((Date.now() - parseInt(localStorage.getItem('coc_sync_time'))) / 1000);
            localStorage.setItem('time_offsets', JSON.stringify(timeOffsets));
            render();
        }
    }

    function getRemaining(item, key) {
        const offset = timeOffsets[item.uid] || 0;
        return Math.max(0, Math.floor((item.targetTime + (offset * 1000) - Date.now()) / 1000));
    }

    function processData(data) {
        const syncTime = parseInt(localStorage.getItem('coc_sync_time') || Date.now());
        order.forEach(key => {
            if (data[key]) {
                data[key].forEach(item => {
                    item.uid = key + '-' + Math.random().toString(36).substr(2, 9);
                    item.targetTime = syncTime + (item.timer * 1000);
                    item.total = item.total || item.timer * 1.1;
                });
                data[key] = data[key].sort((a, b) => a.targetTime - b.targetTime);
            }
        });
        appData = data;
        render();
    }

    function render() {
        if (!appData) return;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        order.forEach(key => {
            if (appData[key]) {
                const items = appData[key].filter(i => getRemaining(i, key) > 0);
                if (items.length > 0) {
                    const earliest = new Date(Date.now() + getRemaining(items[0], key) * 1000);
                    listDiv.innerHTML += `
                        <div class="group-header">
                            <span>${titles[key]}</span>
                            <span class="group-deadline">Xong lúc: ${earliest.getHours()}:${String(earliest.getMinutes()).padStart(2,'0')}</span>
                        </div>`;
                    
                    items.forEach(item => {
                        const rem = getRemaining(item, key);
                        listDiv.innerHTML += `
                            <div class="card">
                                <div class="flex-row">
                                    <div class="b-name">${nameMap[item.data] || 'Mã: ' + item.data}</div>
                                    <div>
                                        ${key === 'units2' ? `<button class="btn-time-edit" onclick="editTime('${item.uid}')">Sửa Giờ</button>` : ''}
                                        <button class="btn-edit" onclick="prompt('Sửa tên:', '${nameMap[item.data]||''}').then(n=>n && localStorage.setItem('name_mapping', JSON.stringify({...nameMap, [item.data]:n})) || location.reload())">Sửa tên</button>
                                    </div>
                                </div>
                                <div class="live-timer">${format(rem)}</div>
                            </div>`;
                    });
                }
            }
        });
    }

    function format(s) {
        if(s <= 0) return "Hoàn tất";
        const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return `${d>0?d+'d ':''}${h}h ${m}m ${sec}s`;
    }

    setInterval(render, 1000);
    window.onload = () => { if(localStorage.getItem('coc_data')) processData(JSON.parse(localStorage.getItem('coc_data'))); };
</script>
</body>
</html>
