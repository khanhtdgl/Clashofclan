<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Quick Dash</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        
        .summary-card { background: #1c2128; border-radius: 8px; padding: 10px; margin-bottom: 20px; border: 1px solid #30363d; }
        .summary-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2d333b; }
        .summary-time { font-family: monospace; color: #fff; font-weight: bold; }
        
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .btn-edit { padding: 4px 10px; background: #30363d; border: none; color: #aaa; border-radius: 4px; font-size: 11px; }
        
        .progress-container { background: #0d1117; height: 5px; border-radius: 3px; margin-top: 6px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; border-top: 1px solid #30363d; }
        textarea { width: 100%; height: 40px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        .btn-update { width: 100%; margin-top: 5px; padding: 8px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div style="color:var(--accent); font-weight:bold; margin-bottom:5px">TỔNG QUAN</div>
    <div class="summary-card" id="summary-list"></div>
    <div id="list"></div>
    <div style="height: 120px;"></div>
</div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    let cachedData = null;
    const order = ["buildings", "units2", "pets", "buildings2"];
    const titles = { "buildings": "Làng chính", "units2": "Nghiên cứu", "pets": "Linh thú", "buildings2": "Làng thợ xây" };

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    function editName(id) {
        const newName = prompt(`Đặt tên cho mã: ${id}`, nameMap[id] || "");
        if (newName !== null) {
            nameMap[id] = newName;
            localStorage.setItem('name_mapping', JSON.stringify(nameMap));
            render();
        }
    }

    function processJSON(raw) {
        try {
            cachedData = JSON.parse(raw);
            render();
        } catch(e) { alert("JSON lỗi!"); }
    }

    function render() {
        if (!cachedData) return;
        const listDiv = document.getElementById('list');
        const sumDiv = document.getElementById('summary-list');
        listDiv.innerHTML = ''; sumDiv.innerHTML = '';

        order.forEach(key => {
            if (cachedData[key]) {
                // Render Summary
                sumDiv.innerHTML += `<div class="summary-row"><span>${titles[key]}</span><span class="summary-time">${getMinTime(cachedData[key])}</span></div>`;
                
                // Render Cards
                if (cachedData[key].length > 0) {
                    listDiv.innerHTML += `<div style="color:var(--accent); font-size:0.8em; font-weight:bold; margin: 10px 0 5px 5px;">${titles[key].toUpperCase()}</div>`;
                    cachedData[key].forEach(item => {
                        const id = item.id || item.name;
                        const total = item.totalTime || item.duration || (item.timer * 1.1);
                        const percent = Math.min(100, Math.max(0, ((total - item.timer) / total) * 100));
                        listDiv.innerHTML += `
                            <div class="card">
                                <div class="flex-row">
                                    <div class="b-name">${nameMap[id] || id}</div>
                                    <button class="btn-edit" onclick="editName('${id}')">Sửa</button>
                                </div>
                                <div style="font-family:monospace">${format(item.timer)}</div>
                                <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                            </div>`;
                    });
                }
            }
        });
    }

    function getMinTime(arr) {
        let min = Math.min(...arr.map(i => i.timer));
        return min > 0 ? format(min) : "Xong";
    }

    function format(s) {
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        return (d > 0 ? d + "d " : "") + h + "h " + m + "m";
    }

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
