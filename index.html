<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Pro - Minimal</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-danger { background: #552222; border: 1px solid #8b0000; color: #ff7b72; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; margin-bottom: 4px; }
        .live-timer { font-family: monospace; font-size: 1.3em; color: var(--accent); font-weight: bold; }
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 50px; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        .btn-update { width: 100%; margin-top: 5px; padding: 10px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-weight:bold; color:var(--accent);">TIẾN ĐỘ CÔNG TRÌNH</div>
    <button class="btn-danger" onclick="resetAll()">Xóa</button>
</div>

<div id="list"></div>
<div style="height: 150px;"></div> 

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    let appData = null;

    function resetAll() { localStorage.removeItem('coc_data'); location.reload(); }

    function handleInput() {
        try {
            const data = JSON.parse(document.getElementById('jsonInput').value);
            localStorage.setItem('coc_data', JSON.stringify(data));
            localStorage.setItem('coc_sync_time', Date.now().toString());
            processData(data);
        } catch(e) { alert("JSON lỗi!"); }
    }

    function processData(data) {
        const syncTime = parseInt(localStorage.getItem('coc_sync_time') || Date.now());
        appData = data;
        render(syncTime);
    }

    function render(syncTime) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        ["buildings", "units2", "pets", "buildings2"].forEach(key => {
            if (appData[key]) {
                appData[key].forEach(item => {
                    const rem = Math.max(0, Math.floor((syncTime + (item.timer * 1000) - Date.now()) / 1000));
                    if (rem > 0) {
                        listDiv.innerHTML += `
                            <div class="card">
                                <div class="b-name">${nameMap[item.data] || 'Công trình ' + item.data}</div>
                                <div class="live-timer" id="t-${item.data}">${format(rem)}</div>
                            </div>`;
                    }
                });
            }
        });
    }

    function format(s) {
        const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return `${d>0?d+'d ':''}${h}h ${m}m ${sec}s`;
    }

    setInterval(() => { if(appData) render(parseInt(localStorage.getItem('coc_sync_time'))); }, 1000);

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) processData(JSON.parse(saved));
    };
</script>
</body>
</html>
