<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Tiến Độ Nâng Cấp</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #f59e0b;
            --elixir: #d946ef;
            --dark-elixir: #6366f1;
            --time-color: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 16px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.5;
        }

        h1 {
            text-align: center;
            color: var(--gold);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-account {
            text-align: center;
            color: var(--text-muted);
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .village-section {
            margin-bottom: 35px;
        }

        .village-title {
            font-size: 18px;
            color: var(--text-main);
            border-left: 4px solid var(--gold);
            padding-left: 10px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .village-section:nth-of-type(2) .village-title {
            border-left-color: var(--dark-elixir);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card h3::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--gold);
        }
        .card.lab h3::after { background-color: var(--elixir); }
        .card.pet h3::after { background-color: var(--dark-elixir); }

        .list-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .list-item:last-child { margin-bottom: 0; }

        .item-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .item-name { font-weight: 600; color: #fff; }
        .item-lvl { color: var(--text-muted); font-size: 12px; margin-left: 5px; }
        
        .item-time {
            font-weight: 700;
            color: var(--time-color);
            font-family: monospace;
            font-size: 14px;
            background: rgba(239, 68, 68, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .status-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 13px;
            text-align: center;
            padding: 15px 0;
        }

        /* KHU VỰC NHẬP JSON */
        .json-area {
            margin-top: 40px;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        .json-area h3 { color: var(--text-main); margin-top: 0; font-size: 16px;}
        
        textarea {
            width: 100%;
            background-color: var(--bg-main);
            color: #34d399;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        .btn-group {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--gold); color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body>

    <h1>Tiến Độ Nâng Cấp CoC</h1>
    <div class="tag-account" id="account-tag">#PLAYER_TAG</div>

    <!-- HẠNG MỤC LÀNG CHÍNH -->
    <div class="village-section">
        <div class="village-title">Làng Chính (Home Village)</div>
        <div class="grid-container">
            <div class="card">
                <h3>Thợ Xây Đang Làm</h3>
                <div id="home-builders"></div>
            </div>
            <div class="card lab">
                <h3>Phòng Thí Nghiệm</h3>
                <div id="home-lab"></div>
            </div>
            <div class="card pet">
                <h3>Nhà Linh Thú</h3>
                <div id="home-pets"></div>
            </div>
        </div>
    </div>

    <!-- HẠNG MỤC LÀNG THỢ XÂY -->
    <div class="village-section">
        <div class="village-title">Làng Thợ Xây (Builder Base)</div>
        <div class="grid-container">
            <div class="card">
                <h3>Thợ Xây Đang Làm</h3>
                <div id="builder-builders"></div>
            </div>
            <div class="card lab">
                <h3>Phòng Thí Nghiệm Sao</h3>
                <div id="builder-lab"></div>
            </div>
        </div>
    </div>

    <!-- KHU VỰC CẬP NHẬT NHANH -->
    <div class="json-area">
        <h3>Dán Dữ Liệu JSON Mới</h3>
        <textarea id="json-input" rows="5" placeholder="Dán chuỗi dữ liệu mã hóa từ file game vào đây..."></textarea>
        <div class="btn-group">
            <button class="btn-primary" onclick="saveNewJson()">Cập Nhật Ngay</button>
            <button class="btn-secondary" onclick="clearLocalData()">Dùng File Gốc GitHub</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
