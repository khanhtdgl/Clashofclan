<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Tracker</title>
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: sans-serif; padding: 10px; }
        .card { background: #161b22; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #e67e22; }
        .group-header { color: #e67e22; font-weight: bold; margin-top: 20px; display: flex; justify-content: space-between; }
        button { background: #8b5cf6; border: none; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // Kiểm tra xem có dữ liệu chưa, nếu chưa thì tạo khung giả để test
    let data = JSON.parse(localStorage.getItem('coc_data') || '{"buildings":[]}');
    
    function render() {
        let html = '';
        ["buildings", "units2", "pets", "buildings2"].forEach(key => {
            if (data[key] && data[key].length > 0) {
                html += `<div class="group-header"><span>${key}</span><span>Xong: 15:30</span></div>`;
                data[key].forEach(item => {
                    html += `<div class="card">${item.timer} giây <button onclick="alert('Đã xóa')">Sửa</button></div>`;
                });
            }
        });
        document.getElementById('app').innerHTML = html || 'Chưa có dữ liệu, hãy dán JSON vào.';
    }
    
    render();
</script>
</body>
</html>
