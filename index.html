<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC Mobile Pro</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #e67e22; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        #view-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #232933; border: none; color: #fff; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #000; }
        
        .view { display: none; margin-bottom: 120px; }
        .view.active { display: block; }
        
        .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 6px; border-left: 4px solid var(--accent); }
        .b-name { font-weight: bold; color: #fff; font-size: 1.1em; }
        .b-id { font-size: 0.8em; color: #8b949e; font-family: monospace; }
        
        .input-row { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 4px; }
        .btn-small { padding: 8px; background: var(--accent); border: none; border-radius: 4px; font-weight: bold; }
        
        #input-zone { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; padding: 12px; box-sizing: border-box; border-top: 1px solid #30363d; z-index: 100; }
        textarea { width: 100%; height: 45px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; padding: 8px; box-sizing: border-box; font-size: 13px; }
        .btn-update { width: 100%; margin-top: 8px; padding: 8px; background: var(--accent); border: none; color: #000; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="view-switch">
    <button class="tab-btn active" onclick="switchView('dash')">Dashboard</button>
    <button class="tab-btn" onclick="switchView('config')">Cấu hình tên</button>
</div>

<div id="view-dash" class="view active">
    <div id="list"></div>
</div>

<div id="view-config" class="view">
    <div class="card">
        <h3>Thêm tên cho mã</h3>
        <div class="input-row">
            <input type="text" id="new-id" placeholder="Mã ID (vd: archerTower)">
        </div>
        <div class="input-row">
            <input type="text" id="new-name" placeholder="Tên tiếng Việt">
            <button class="btn-small" onclick="addMapping()">LƯU</button>
        </div>
        <hr style="border:0; border-top: 1px solid #30363d;">
        <div id="mapping-list"></div>
    </div>
</div>

<div id="input-zone">
    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>
    <button class="btn-update" onclick="handleInput()">CẬP NHẬT</button>
</div>

<script>
    let nameMap = JSON.parse(localStorage.getItem('name_mapping') || '{}');
    const order = ["buildings", "units2", "pets", "buildings2"];
    let dataGroups = {};

    function switchView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        event.target.classList.add('active');
        if (v === 'config') renderMapping();
    }

    function addMapping() {
        const id = document.getElementById('new-id').value;
        const name = document.getElementById('new-name').value;
        if(id && name) {
            nameMap[id] = name;
            localStorage.setItem('name_mapping', JSON.stringify(nameMap));
            renderMapping();
            document.getElementById('new-id').value = '';
            document.getElementById('new-name').value = '';
        }
    }

    function deleteMapping(id) {
        delete nameMap[id];
        localStorage.setItem('name_mapping', JSON.stringify(nameMap));
        renderMapping();
    }

    function renderMapping() {
        const div = document.getElementById('mapping-list');
        div.innerHTML = '';
        Object.keys(nameMap).forEach(key => {
            div.innerHTML += `<div class="flex-row" style="margin:5px 0">
                <span><strong>${key}</strong>: ${nameMap[key]}</span>
                <button class="btn-small" style="background:#555" onclick="deleteMapping('${key}')">X</button>
            </div>`;
        });
    }

    function handleInput() {
        const raw = document.getElementById('jsonInput').value;
        if (!raw) return;
        localStorage.setItem('coc_data', raw);
        processJSON(raw);
    }

    function processJSON(raw) {
        try {
            const data = JSON.parse(raw);
            dataGroups = {};
            order.forEach(k => dataGroups[k] = []);
            Object.keys(dataGroups).forEach(cat => {
                if (data[cat]) {
                    data[cat].forEach(item => {
                        if (item.timer) {
                            // Ưu tiên tên đã mapping, không thì hiện ID
                            const displayName = nameMap[item.id] || nameMap[item.name] || item.id || "Nâng cấp";
                            dataGroups[cat].push({ id: item.id || item.name, name: displayName, timer: item.timer, total: item.totalTime || item.duration || (item.timer * 1.1) });
                        }
                    });
                }
            });
            renderDash();
        } catch(e) { alert("JSON lỗi!"); }
    }

    function renderDash() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '';
        order.forEach(key => {
            if (dataGroups[key] && dataGroups[key].length > 0) {
                listDiv.innerHTML += `<div style="color:var(--accent); font-weight:bold; margin-top:10px">${key.toUpperCase()}</div>`;
                dataGroups[key].forEach(item => {
                    listDiv.innerHTML += `
                        <div class="card">
                            <div class="b-name">${item.name}</div>
                            <div class="b-id">Mã: ${item.id}</div>
                            <div style="font-weight:bold">${format(item.timer)}</div>
                        </div>`;
                });
            }
        });
    }

    function format(s) {
        if (s <= 0) return "Hoàn tất";
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        return (d>0 ? d+"d " : "") + h + "h " + Math.floor((s%3600)/60) + "m";
    }

    window.onload = () => {
        const saved = localStorage.getItem('coc_data');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            processJSON(saved);
        }
    };
</script>
</body>
</html>
