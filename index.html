<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COC Timer</title>

<style>
body{
    margin:0;
    background:#1f2937;
    color:white;
    font-family:Arial;
}

.container{
    max-width:480px;
    margin:auto;
    padding:15px;
}

.summary,.card{
    background:#374151;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
}

h2,h3{
    margin:0 0 10px;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #4b5563;
}

.summary-item:last-child{
    border:none;
}

.row{
    display:flex;
    gap:6px;
    margin:10px 0;
}

.row input{
    width:55px;
    padding:8px;
    text-align:center;
    font-size:16px;
    border:none;
    border-radius:8px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.start{
    background:#22c55e;
    color:white;
}

.reset{
    background:#ef4444;
    color:white;
}

.time{
    margin-top:8px;
    font-size:18px;
    font-weight:bold;
    color:#4ade80;
}

.done{
    color:#facc15;
}
</style>
</head>

<body>

<div class="container">

<div class="summary">
<h2>📋 Sắp hoàn thành</h2>

<div id="summaryList">
Chưa có bộ đếm nào.
</div>

</div>

<div id="cards"></div>

</div>

<script>
const names=[
"Thợ 1",
"Thợ 2",
"Thợ 3",
"Thợ 4",
"Thợ 5",
"Thợ 6",
"Nghiên cứu",
"Linh thú"
];
</script>

</body>
</html>
